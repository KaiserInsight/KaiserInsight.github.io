<script>
(function(){
  const audio = document.getElementById('siteAudio');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const playlist = document.getElementById('playlist');
  const progress = document.getElementById('progress');
  const titleEl = document.getElementById('playerTitle');

  const tracks = Array.from(playlist.options).map(o => ({ src: o.value, title: o.text }));
  let index = Number(localStorage.getItem('musicIndex')) || 0;
  let isPlaying = false;

  const getNextIndex = () => {
    return (index + 1) % tracks.length;
  };

  const loadTrack = (i, autoplay = false) => {
    index = (i + tracks.length) % tracks.length;
    if (!audio) return;
    audio.src = tracks[index].src;
    titleEl.textContent = tracks[index].title;
    playlist.selectedIndex = index;
    audio.load();
    if (autoplay && isPlaying) {
      audio.play().catch(() => {});
    }
    localStorage.setItem('musicIndex', index);
  };

  const setPlaying = (playing) => {
    isPlaying = playing;
    playBtn.textContent = playing ? '⏸' : '▶';
  };

  const play = () => {
    if (!audio) return;
    audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
  };

  const pause = () => {
    if (!audio) return;
    audio.pause();
    setPlaying(false);
  };

  playBtn.addEventListener('click', () => {
    if (isPlaying) pause(); else play();
  });

  prevBtn.addEventListener('click', () => {
    loadTrack(index - 1, true);
  });
  nextBtn.addEventListener('click', () => {
    loadTrack(index + 1, true);
  });

  playlist.addEventListener('change', () => {
    loadTrack(playlist.selectedIndex, isPlaying);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    progress.value = Math.floor((audio.currentTime / audio.duration) * 100);
  });

  progress.addEventListener('input', () => {
    if (!audio.duration) return;
    audio.currentTime = (progress.value / 100) * audio.duration;
  });

  audio.addEventListener('ended', () => {
    const next = getNextIndex();
    loadTrack(next, true);
  });

  if (index < 0 || index >= tracks.length) { index = 0; }
  loadTrack(index, false);
})();
</script>

<script>
(function(){
  const pageTransition = document.getElementById('pageTransition');

  const transitionSongs = [
    {
      "name": "CommonTrial_Ema05117.ogg",
      "src": "\/songs\/CommonTrial_Ema05117.ogg"
    }
  ];
  const transitionAudio = transitionSongs.length ? new Audio(transitionSongs[0].src) : null;
  if (transitionAudio) {
    transitionAudio.loop = true;
    transitionAudio.volume = 0.16;
    transitionAudio.preload = 'auto';
  }

  const showTransition = () => {
    pageTransition.classList.add('visible');
    if (transitionAudio) {
      transitionAudio.currentTime = 0;
      try {
        transitionAudio.play();
      } catch (err) {
        
      }
    }
    return new Promise(resolve => setTimeout(resolve, 900));
  };

  const hideTransition = () => {
    pageTransition.classList.remove('visible');
    if (transitionAudio) {
      transitionAudio.pause();
      transitionAudio.currentTime = 0;
    }
  };

  document.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('javascript:')) return;
    if (link.target === '_blank') return;
    const isSameOrigin = link.href.startsWith(window.location.origin);
    if (isSameOrigin) {
      link.addEventListener('click', async e => {
        e.preventDefault();
        await showTransition();
        window.location.href = href;
      });
    }
  });

  window.addEventListener('pageshow', hideTransition);
})();
</script>
