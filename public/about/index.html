<script>
(function(){
  const pageTransition = document.getElementById('pageTransition');

  const transitionSongs = [
    {
      "name": "CommonTrial_Ema05117.ogg",
      "src": "\/songs\/CommonTrial_Ema05117.ogg"
    }
  ];
  const transitionAudio = transitionSongs.length ? new Audio(transitionSongs[0].src) : null;
  if (transitionAudio) {
    transitionAudio.loop = true;
    transitionAudio.volume = 0.16;
    transitionAudio.preload = 'auto';
  }

  const showTransition = () => {
    pageTransition.classList.add('visible');
    if (transitionAudio) {
      transitionAudio.currentTime = 0;
      try {
        transitionAudio.play();
      } catch (err) {
        
      }
    }
    return new Promise(resolve => setTimeout(resolve, 900));
  };

  const hideTransition = () => {
    pageTransition.classList.remove('visible');
    if (transitionAudio) {
      transitionAudio.pause();
      transitionAudio.currentTime = 0;
    }
  };

  document.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('javascript:')) return;
    if (link.target === '_blank') return;
    const isSameOrigin = link.href.startsWith(window.location.origin);
    if (isSameOrigin) {
      link.addEventListener('click', async e => {
        e.preventDefault();
        await showTransition();
        window.location.href = href;
      });
    }
  });

  window.addEventListener('pageshow', hideTransition);
})();
</script>
